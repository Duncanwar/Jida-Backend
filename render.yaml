# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# After deploy, set CORS_ORIGIN to your frontend URL in the service Environment tab.
#
# Manuscript uploads: free-tier filesystem is ephemeral (lost on redeploy).
# For production, upgrade the web service to Starter+ and enable the disk block below.

databases:
  - name: jida-db
    databaseName: jida
    user: jida
    plan: free

services:
  - type: web
    name: jida-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    preDeployCommand: npm run render:release
    healthCheckPath: /health
    autoDeploy: true
    # Upgrade to plan: starter (or higher) before enabling persistent uploads:
    # disk:
    #   name: jida-uploads
    #   mountPath: /var/data/uploads
    #   sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jida-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_MIN
        value: "15"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
